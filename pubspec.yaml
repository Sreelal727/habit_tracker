name: habit_tracker
description: "A habit tracker app for tracking daily habits and goals."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.0
  fl_chart: ^0.70.2
  uuid: ^4.5.1
  intl: ^0.19.0
  path_provider: ^2.1.5
  path: ^1.9.1
  collection: ^1.19.1
  supabase_flutter: ^2.8.0
  image_picker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.24.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
